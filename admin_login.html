<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SAFEWAY ADMIN</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#111;
  padding:30px;
  width:300px;
  border-radius:10px;
  box-shadow:0 0 10px red;
  text-align:center;
}

h1{color:red;}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#1a1a1a;
  border:1px solid red;
  color:white;
}

button{
  width:100%;
  padding:10px;
  background:red;
  border:none;
  color:white;
  cursor:pointer;
}

#error{color:orange;margin-top:10px;}
</style>
</head>

<body>

<div class="box">
  <h1>ADMIN SAFEWAY</h1>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="login()">Connexion</button>

  <div id="error"></div>
</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ycswpdydsgoqplkqtpsd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljc3dwZHlkc2dvcXBsa3F0cHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjY4MTcsImV4cCI6MjA5MDU0MjgxN30.67bBMdHtcGFIJuZuY_Xd4hBN4hj86JjHVXGN3oPbKMA"
);

window.login = async function () {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if(!username || !password){
    document.getElementById("error").innerText = "Remplis tous les champs";
    return;
  }

  const { data, error } = await supabase
    .rpc("login_admin", {
      p_username: username,
      p_password: password
    })
    .single();

  if(error || !data){
    document.getElementById("error").innerText = "Identifiants incorrects";
    return;
  }

  localStorage.setItem("admin", JSON.stringify(data));

  window.location.href = "dashboard.html";
};

</script>

</body>
</html>
