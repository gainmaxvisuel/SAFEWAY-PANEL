<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>SAFEWAY ADMIN</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#111;
padding:20px;
}

.sidebar h2{
color:red;
text-align:center;
}

.sidebar button{
width:100%;
margin-top:10px;
padding:10px;
background:transparent;
border:1px solid red;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:red;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

.card{
background:linear-gradient(145deg,#1a1a1a,#0f0f0f);
padding:15px;
margin:10px 0;
border-radius:12px;
border-left:4px solid red;
position:relative;
}

/* MENU 3 POINTS */
.dots{
position:absolute;
top:10px;
right:10px;
cursor:pointer;
font-size:20px;
}

.menu{
display:none;
position:absolute;
right:10px;
top:30px;
background:#222;
border:1px solid red;
padding:10px;
z-index:999;
}

.menu button{
width:100%;
background:transparent;
border:none;
color:white;
cursor:pointer;
}

.menu button:hover{
color:red;
}

.tab{display:none;}
.tab.active{display:block;}

#quickMenu{
position:fixed;
top:10px;
right:10px;
z-index:999;
}

#quickMenu button{
background:red;
color:white;
border:none;
padding:10px;
}

#quickPanel{
display:none;
background:#111;
border:1px solid red;
margin-top:10px;
}

#quickPanel button{
width:100%;
background:transparent;
border:none;
color:white;
padding:10px;
}

#quickPanel button:hover{
background:red;
}
</style>

</head>

<body>

<!-- QUICK MENU -->
<div id="quickMenu">
<button onclick="toggleQuick()">⋮</button>

<div id="quickPanel">
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('deposits')">Dépôts</button>
<button onclick="showTab('withdrawals')">Retraits</button>
<button onclick="showTab('users')">Users</button>
<button onclick="showTab('approved')">Validés</button>
<button onclick="showTab('settings')">Système</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>SAFEWAY</h2>

<button onclick="showTab('dashboard')">📊 Dashboard</button>
<button onclick="showTab('deposits')">💰 Dépôts</button>
<button onclick="showTab('withdrawals')">💸 Retraits</button>
<button onclick="showTab('users')">👤 Users</button>
<button onclick="showTab('approved')">✅ Validés</button>
<button onclick="showTab('settings')">⚙ Système</button>
<button onclick="logout()">🚪 Logout</button>

</div>

<!-- MAIN -->
<div class="main">

<div id="dashboard" class="tab active">
<h1>Dashboard</h1>
<div id="stats"></div>
</div>

<div id="deposits" class="tab">
<h1>Dépôts en attente</h1>
<div id="depositList"></div>
</div>

<div id="withdrawals" class="tab">
<h1>Retraits en attente</h1>
<div id="withdrawList"></div>
</div>

<div id="users" class="tab">
<h1>Utilisateurs</h1>
<div id="userList"></div>
</div>

<div id="approved" class="tab">
<h1>Validés</h1>
<h3>Dépôts</h3>
<div id="approvedDeposits"></div>
<h3>Retraits</h3>
<div id="approvedWithdrawals"></div>
</div>

<div id="settings" class="tab">
<h1>Système</h1>

<div class="card">
<h3>Frais retrait</h3>
<input id="fee" type="number">
</div>

<div class="card">
<h3>Min dépôt</h3>
<input id="minDeposit" type="number">
</div>

<div class="card">
<h3>Min retrait</h3>
<input id="minWithdraw" type="number">
</div>

<button onclick="updateSettings()">Sauvegarder</button>

</div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://ycswpdydsgoqplkqtpsd.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljc3dwZHlkc2dvcXBsa3F0cHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjY4MTcsImV4cCI6MjA5MDU0MjgxN30.67bBMdHtcGFIJuZuY_Xd4hBN4hj86JjHVXGN3oPbKMA"
);

/* QUICK */
window.toggleQuick=()=>{
const p=document.getElementById("quickPanel");
p.style.display=p.style.display==="block"?"none":"block";
};

/* NAV */
window.showTab=(tab)=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(tab).classList.add("active");

if(tab==="dashboard") loadStats();
if(tab==="deposits") loadDeposits();
if(tab==="withdrawals") loadWithdrawals();
if(tab==="users") loadUsers();
if(tab==="approved") loadApproved();
if(tab==="settings") loadSettings();
};

/* STATS */
async function loadStats(){
const u=await supabase.from("users").select("*");
const d=await supabase.from("deposits").select("*");
const w=await supabase.from("withdrawals").select("*");

document.getElementById("stats").innerHTML=`
<div class="card">Users: ${u.data.length}</div>
<div class="card">Dépôts: ${d.data.length}</div>
<div class="card">Retraits: ${w.data.length}</div>
`;
}

/* ================= DEPOSITS ================= */
async function loadDeposits(){
const {data}=await supabase.from("deposits").select("*").eq("status","pending");

document.getElementById("depositList").innerHTML =
(data||[]).map(d=>`
<div class="card">
<div class="dots" onclick="toggleUserMenu(event,'d-${d.id}')">⋮</div>

<div class="menu" id="menu-d-${d.id}">
<button onclick="approveDeposit('${d.id}')">✔ Approuver</button>
<button onclick="rejectDeposit('${d.id}')">✖ Rejeter</button>
</div>

<b>User:</b> ${d.user_id}<br>
<b>Montant:</b> ${d.amount}<br>
<b>Status:</b> ${d.status}<br>
</div>
`).join("");
}

/* DEPOT APPROVED */
window.approveDeposit=async(id)=>{

const { data: dep } = await supabase
.from("deposits")
.select("*")
.eq("id",id)
.single();

await supabase.from("deposits")
.update({status:"completed"})
.eq("id",id);

const { data: user } = await supabase
.from("users")
.select("balance")
.eq("id",dep.user_id)
.single();

await supabase.from("users")
.update({
balance: Number(user.balance) + Number(dep.amount)
})
.eq("id",dep.user_id);

await supabase.from("transactions").insert({
user_id: dep.user_id,
type:"deposit",
amount:dep.amount,
status:"completed"
});

loadDeposits();
loadStats();
};

/* DEPOT REJECT */
window.rejectDeposit=async(id)=>{

const { data: dep } = await supabase
.from("deposits")
.select("*")
.eq("id",id)
.single();

await supabase.from("deposits")
.update({status:"failed"})
.eq("id",id);

await supabase.from("transactions").insert({
user_id: dep.user_id,
type:"deposit",
amount:dep.amount,
status:"failed"
});

loadDeposits();
loadStats();
};

/* ================= WITHDRAWALS ================= */
async function loadWithdrawals(){
const {data}=await supabase.from("withdrawals").select("*").eq("status","pending");

document.getElementById("withdrawList").innerHTML =
(data||[]).map(w=>`
<div class="card">
<div class="dots" onclick="toggleUserMenu(event,'w-${w.id}')">⋮</div>

<div class="menu" id="menu-w-${w.id}">
<button onclick="approveWithdraw('${w.id}')">✔ Approuver</button>
<button onclick="rejectWithdraw('${w.id}')">✖ Rejeter</button>
</div>

<b>User:</b> ${w.user_id}<br>
<b>Montant:</b> ${w.amount}<br>
<b>Status:</b> ${w.status}<br>
</div>
`).join("");
}

/* WITHDRAW APPROVED */
window.approveWithdraw=async(id)=>{

const { data: w } = await supabase
.from("withdrawals")
.select("*")
.eq("id",id)
.single();

await supabase.from("withdrawals")
.update({status:"completed"})
.eq("id",id);

await supabase.from("transactions").insert({
user_id:w.user_id,
type:"withdraw",
amount:w.amount,
status:"completed"
});

loadWithdrawals();
loadStats();
};

/* WITHDRAW REJECT + REFUND */
window.rejectWithdraw=async(id)=>{

const { data: w } = await supabase
.from("withdrawals")
.select("*")
.eq("id",id)
.single();

await supabase.from("withdrawals")
.update({status:"failed"})
.eq("id",id);

const { data: user } = await supabase
.from("users")
.select("balance")
.eq("id",w.user_id)
.single();

await supabase.from("users")
.update({
balance: Number(user.balance) + Number(w.amount)
})
.eq("id",w.user_id);

await supabase.from("transactions").insert({
user_id:w.user_id,
type:"withdraw",
amount:w.amount,
status:"failed"
});

loadWithdrawals();
loadStats();
};

/* USERS */
async function loadUsers(){
const {data}=await supabase.from("users").select("*");

document.getElementById("userList").innerHTML =
(data||[]).map(u=>`
<div class="card">

<div class="dots" onclick="toggleUserMenu(event,'${u.id}')">⋮</div>

<div class="menu" id="menu-${u.id}">
<button style="color:lime" onclick="addBalance('${u.id}',${u.balance})">+ Ajouter solde</button>
<button style="color:red" onclick="reduceBalance('${u.id}',${u.balance})">- Réduire solde</button>
</div>

<b>${u.full_name || ""}</b><br>
Pays: ${u.country_code || ""}<br>
Phone: ${u.phone || ""}<br>
Solde: ${u.balance || 0}

</div>
`).join("");
}

/* MENU FIX */
window.toggleUserMenu=(e,id)=>{
e.stopPropagation();
document.querySelectorAll(".menu").forEach(m=>m.style.display="none");
const menu=document.getElementById("menu-"+id);
if(menu){
menu.style.display=menu.style.display==="block"?"none":"block";
}
};

document.addEventListener("click",()=>{
document.querySelectorAll(".menu").forEach(m=>m.style.display="none");
});

/* ADD / REDUCE */
window.addBalance=async(id,balance)=>{
const a=prompt("Montant ?");
if(!a)return;

await supabase.from("users")
.update({balance:Number(balance)+Number(a)})
.eq("id",id);

loadUsers();
};

window.reduceBalance=async(id,balance)=>{
const a=prompt("Montant ?");
if(!a)return;

await supabase.from("users")
.update({balance:Number(balance)-Number(a)})
.eq("id",id);

loadUsers();
};

/* APPROVED */
async function loadApproved(){
const d=await supabase.from("deposits").select("*").eq("status","completed");
const w=await supabase.from("withdrawals").select("*").eq("status","completed");

document.getElementById("approvedDeposits").innerHTML =
(d.data||[]).map(x=>`<div class="card">✔ ${x.amount}</div>`).join("");

document.getElementById("approvedWithdrawals").innerHTML =
(w.data||[]).map(x=>`<div class="card">✔ ${x.amount}</div>`).join("");
}

/* SETTINGS */
async function loadSettings(){
const {data}=await supabase.from("settings").select("*").eq("id",1).single();

fee.value=data.withdraw_fee;
minDeposit.value=data.min_deposit;
minWithdraw.value=data.min_withdraw;
}

window.updateSettings=async()=>{
await supabase.from("settings").update({
withdraw_fee:fee.value,
min_deposit:minDeposit.value,
min_withdraw:minWithdraw.value
}).eq("id",1);

alert("OK");
};

/* LOGOUT */
window.logout=()=>{
localStorage.removeItem("admin");
location.href="admin_login.html";
};

/* INIT */
loadStats();

</script>

</body>
</html>
